apiVersion: v1
kind: Namespace
metadata:
  name: edu-system
---
# Nacos Config
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: edu-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.3.2
          ports:
            - containerPort: 8848
          env:
            - name: MODE
              value: "standalone"
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: edu-system
spec:
  selector:
    app: nacos
  ports:
    - port: 8848
      targetPort: 8848
---
# Gateway Deployment Template
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edu-gateway
  namespace: edu-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edu-gateway
  template:
    metadata:
      labels:
        app: edu-gateway
    spec:
      containers:
        - name: edu-gateway
          image: edu-system/edu-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: NACOS_SERVER_ADDR
              value: "nacos:8848"
            - name: ZIPKIN_ENDPOINT
              value: "http://zipkin:9411/api/v2/spans"
            - name: ADMIN_SERVER_URL
              value: "http://edu-monitor:8093"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edu-gateway
  namespace: edu-system
spec:
  selector:
    app: edu-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
