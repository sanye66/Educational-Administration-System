name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '11'
  MAVEN_VERSION: '3.8'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build with Maven
      run: mvn clean compile -DskipTests
      
    - name: Run tests
      run: mvn test
      
    - name: Package application
      run: mvn package -DskipTests
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: '**/target/*.jar'
        
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Run PMD analysis
      run: mvn pmd:pmd pmd:cpd-check || true
      
    - name: Run Checkstyle
      run: mvn checkstyle:checkstyle || true
      
    - name: Upload code quality reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: code-quality-reports
        path: '**/target/site/*.html'
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Dependency vulnerability scan
      run: mvn dependency-check:check || true
      continue-on-error: true
      
    - name: Upload security report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-report
        path: '**/dependency-check-report.html'
        
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Gateway image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: edu-gateway/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/edu-gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/edu-gateway:${{ github.sha }}
          
    - name: Build and push Auth image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: edu-auth/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/edu-auth:latest
          ${{ secrets.DOCKER_USERNAME }}/edu-auth:${{ github.sha }}
          
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to development environment
      run: |
        echo "Deploying to development environment..."
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/dev/
      env:
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV }}
        
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: always()
    
    steps:
    - name: Send notification
      run: |
        echo "Pipeline completed"
        echo "Status: ${{ needs.deploy-dev.result }}"
      # Add Slack/Email notification here
