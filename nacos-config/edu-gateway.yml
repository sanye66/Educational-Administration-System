server:
  port: 8080

spring:
  application:
    name: edu-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务
        - id: edu-auth
          uri: lb://edu-auth
          predicates:
            - Path=/auth/**
        # 用户服务
        - id: edu-user
          uri: lb://edu-user
          predicates:
            - Path=/user/**
        # 教师服务
        - id: edu-teacher
          uri: lb://edu-teacher
          predicates:
            - Path=/teacher/**
        # 学生服务
        - id: edu-student
          uri: lb://edu-student
          predicates:
            - Path=/student/**
        # 课程服务
        - id: edu-course
          uri: lb://edu-course
          predicates:
            - Path=/course/**
        # 教室服务
        - id: edu-classroom
          uri: lb://edu-classroom
          predicates:
            - Path=/classroom/**
        # 选课服务
        - id: edu-selection
          uri: lb://edu-selection
          predicates:
            - Path=/selection/**
        # 成绩服务
        - id: edu-grade
          uri: lb://edu-grade
          predicates:
            - Path=/grade/**
        # 考试服务
        - id: edu-exam
          uri: lb://edu-exam
          predicates:
            - Path=/exam/**
        # 排课服务
        - id: edu-schedule
          uri: lb://edu-schedule
          predicates:
            - Path=/schedule/**
        # 毕设服务
        - id: edu-graduation
          uri: lb://edu-graduation
          predicates:
            - Path=/graduation/**
        # 评价服务
        - id: edu-evaluation
          uri: lb://edu-evaluation
          predicates:
            - Path=/evaluation/**
        # 监控服务
        - id: edu-monitor
          uri: lb://edu-monitor
          predicates:
            - Path=/monitor/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: debug
