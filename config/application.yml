# Nacos 共享配置 - 所有微服务共享
spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# Feign 配置
spring.cloud.openfeign:
  lazy-initialization: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic

# Sentinel 配置
spring.cloud.sentinel:
  eager: true
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
  http-method-specify: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# Spring Boot Admin Client
spring.boot.admin.client:
  url: ${ADMIN_SERVER_URL:http://localhost:8093}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: edu-administration-system-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: edu-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# Seata 配置
seata:
  enabled: false
  application-id: edu-system
  tx-service-group: edu-system-group
  service:
    vgroup-mapping:
      edu-system-group: default
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      namespace: ""
      group: SEATA_GROUP
