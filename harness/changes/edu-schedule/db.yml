service: edu-schedule
version: 1.0.0

database:
  name: edu_schedule
  type: MySQL
  host: ${MYSQL_HOST:localhost}
  port: 3306
  driver: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/edu_schedule?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

tables:
  - name: schedule_result
    comment: 排课结果表
    columns:
      - id: BIGINT, PK, AUTO_INCREMENT
      - course_id: BIGINT, NOT NULL, 课程ID
      - teacher_id: BIGINT, 教师ID
      - classroom_id: BIGINT, 教室ID
      - academic_year: VARCHAR(10), 学年
      - semester: INT, 学期
      - day_of_week: INT, 星期几
      - start_section: INT, 开始节次
      - duration_section: INT, 持续节次
      - status: VARCHAR(20), DEFAULT 'DRAFT', 状态
      - create_by: BIGINT
      - create_time: DATETIME, DEFAULT CURRENT_TIMESTAMP
      - update_by: BIGINT
      - update_time: DATETIME, ON UPDATE CURRENT_TIMESTAMP
      - deleted: TINYINT, DEFAULT 0
