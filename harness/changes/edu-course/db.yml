service: edu-course
version: 1.0.0

database:
  name: edu_course
  type: MySQL
  host: ${MYSQL_HOST:localhost}
  port: 3306
  driver: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/edu_course?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

tables:
  - name: course
    comment: 课程表
    columns:
      - id: BIGINT, PK, AUTO_INCREMENT
      - course_no: VARCHAR(30), NOT NULL, UNIQUE, 课程编号
      - course_name: VARCHAR(100), NOT NULL, 课程名称
      - category_id: BIGINT, 分类ID
      - teacher_id: BIGINT, 授课教师ID
      - credit: DECIMAL(3,1), 学分
      - class_hour: INT, 学时
      - course_type: VARCHAR(20), 课程类型
      - max_capacity: INT, DEFAULT 0, 最大容量
      - current_count: INT, DEFAULT 0, 当前选课人数
      - academic_year: VARCHAR(10), 学年
      - semester: INT, 学期
      - description: TEXT, 课程描述
      - status: VARCHAR(20), DEFAULT 'DRAFT', 状态
      - create_by: BIGINT
      - create_time: DATETIME, DEFAULT CURRENT_TIMESTAMP
      - update_by: BIGINT
      - update_time: DATETIME, ON UPDATE CURRENT_TIMESTAMP
      - deleted: TINYINT, DEFAULT 0
