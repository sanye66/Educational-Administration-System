service: edu-evaluation
version: 1.0.0

database:
  name: edu_evaluation
  type: MySQL
  host: ${MYSQL_HOST:localhost}
  port: 3306
  driver: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/edu_evaluation?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

tables:
  - name: evaluation_record
    comment: 教学评价表
    columns:
      - id: BIGINT, PK, AUTO_INCREMENT
      - student_id: BIGINT, NOT NULL, 学生ID
      - course_id: BIGINT, NOT NULL, 课程ID
      - teacher_id: BIGINT, 教师ID
      - academic_year: VARCHAR(10), 学年
      - semester: INT, 学期
      - attitude_score: DECIMAL(3,2), 教学态度
      - content_score: DECIMAL(3,2), 教学内容
      - method_score: DECIMAL(3,2), 教学方法
      - effect_score: DECIMAL(3,2), 教学效果
      - total_score: DECIMAL(3,2), 总评
      - comment: TEXT, 文字评价
      - status: VARCHAR(20), DEFAULT 'DRAFT', 状态
      - create_by: BIGINT
      - create_time: DATETIME, DEFAULT CURRENT_TIMESTAMP
      - update_by: BIGINT
      - update_time: DATETIME, ON UPDATE CURRENT_TIMESTAMP
      - deleted: TINYINT, DEFAULT 0
