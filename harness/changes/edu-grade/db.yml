service: edu-grade
version: 1.0.0

database:
  name: edu_grade
  type: MySQL
  host: ${MYSQL_HOST:localhost}
  port: 3306
  driver: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/edu_grade?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

tables:
  - name: grade
    comment: 成绩表
    columns:
      - id: BIGINT, PK, AUTO_INCREMENT
      - student_id: BIGINT, NOT NULL, 学生ID
      - course_id: BIGINT, NOT NULL, 课程ID
      - teacher_id: BIGINT, 教师ID
      - academic_year: VARCHAR(10), 学年
      - semester: INT, 学期
      - regular_score: DECIMAL(5,2), 平时成绩
      - midterm_score: DECIMAL(5,2), 期中成绩
      - final_score: DECIMAL(5,2), 期末成绩
      - total_score: DECIMAL(5,2), 总评成绩
      - gpa: DECIMAL(3,2), 绩点
      - status: VARCHAR(20), DEFAULT 'DRAFT', 状态
      - create_by: BIGINT
      - create_time: DATETIME, DEFAULT CURRENT_TIMESTAMP
      - update_by: BIGINT
      - update_time: DATETIME, ON UPDATE CURRENT_TIMESTAMP
      - deleted: TINYINT, DEFAULT 0
    indexes:
      - idx_student_id: student_id
      - idx_course_id: course_id
